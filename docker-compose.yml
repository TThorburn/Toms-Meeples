version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Boardgame Tracker — full stack (BGG XML API2 powered)
#
# Folder structure:
#   docker-compose.yml
#   bg-api/              ← REST API + auth + BGG XML API2
#   boardgame-tracker/   ← React frontend (nginx)
#
# ─── Starting up ─────────────────────────────────────────────────────────────
#   docker compose up --build
#
# ─── App URLs ────────────────────────────────────────────────────────────────
#   Frontend:  http://localhost:8082
#   API:       http://localhost:3001
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  bg-api:
    build:
      context: ./bg-api
      dockerfile: Dockerfile
    container_name: bg-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:-meeple-dev-secret-change-in-production}
      BGG_APP_TOKEN: ${BGG_APP_TOKEN:-}

  # ── Frontend ────────────────────────────────────────────────────────────────
  boardgame-tracker:
    build:
      context: ./boardgame-tracker
      dockerfile: Dockerfile
    container_name: boardgame-tracker
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - bg-api
