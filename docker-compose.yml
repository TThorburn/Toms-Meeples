version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Boardgame Tracker — full stack
#
# Folder structure expected (place this file at the root):
#
#   docker-compose.yml          ← this file
#   bgg-scraper/
#     Dockerfile
#     index.js
#     bgg-search.js
#     package.json
#   bg-api/
#     Dockerfile
#     server.js
#     package.json
#   boardgame-tracker/
#     Dockerfile
#     nginx.conf
#     index.html
#     src/
#     ...
#
# ─── Starting up ─────────────────────────────────────────────────────────────
#   docker compose up --build            # build and start everything
#   docker compose up --build -d         # same but detached (background)
#   docker compose logs -f bgg-scraper  # follow scraper logs
#
# ─── App URLs ────────────────────────────────────────────────────────────────
#   Frontend:  http://localhost
#   API:       http://localhost:3001
#   Scraper:   http://localhost:3002  (useful for testing)
#
# ─── CLI testing (scraper must be running) ───────────────────────────────────
#   # Inside the container:
#   docker compose exec bgg-scraper node bgg-search.js catan
#   docker compose exec bgg-scraper node bgg-search.js terraforming mars
#   docker compose exec bgg-scraper node bgg-search.js "spirit island"
#
#   # From your host machine (scraper port 3002 exposed):
#   curl "http://localhost:3002/search?q=catan" | jq '.games[].name'
#   curl "http://localhost:3002/game/169786"    | jq '{name,bggRating,year}'
#
#   # Or install the CLI tool once (from inside bgg-scraper/):
#   npm install -g .
#   bgg-search catan
#   bgg-search terraforming mars
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── BGG Scraper ─────────────────────────────────────────────────────────────
  # Headless Chrome / Puppeteer scraping service.
  # Keeps one browser instance alive and serves requests on demand.
  # No background indexing — only scrapes when a search request comes in.
  bgg-scraper:
    build:
      context: ./bgg-scraper
      dockerfile: Dockerfile
    container_name: bgg-scraper
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      BGG_HEADLESS: "true"
      BGG_TIMEOUT_MS: "60000"
      BGG_MAX_RETRIES: "3"
    shm_size: "512mb"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 45s

  # ── Backend API ─────────────────────────────────────────────────────────────
  bg-api:
    build:
      context: ./bg-api
      dockerfile: Dockerfile
    container_name: bg-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:-meeple-dev-secret-change-in-production}
      BGG_SCRAPER_HOST: bgg-scraper
      BGG_SCRAPER_PORT: "3002"
    depends_on:
      bgg-scraper:
        condition: service_healthy

  # ── Frontend ────────────────────────────────────────────────────────────────
  boardgame-tracker:
    build:
      context: ./boardgame-tracker
      dockerfile: Dockerfile
    container_name: boardgame-tracker
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - bg-api
